name: styx-js web

# Always reports a stable gate on pull requests and merge-group commits.
on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect styx-js changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.f.outputs.web }}
      vaultdb: ${{ steps.f.outputs.vaultdb }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - id: f
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "merge_group" ]; then
            base_sha="$MERGE_GROUP_BASE_SHA"
          elif [ "$EVENT" = "pull_request" ]; then
            git fetch --no-tags --depth=50 origin "$BASE_REF" >/dev/null 2>&1 || true
            base_sha="$(git merge-base "origin/$BASE_REF" HEAD || echo "")"
          else
            zero="0000000000000000000000000000000000000000"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "$zero" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              base_sha="$BEFORE"
            else
              base_sha="$(git rev-parse HEAD~1 2>/dev/null || echo "")"
            fi
          fi
          if [ -z "$base_sha" ] || ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            echo "Web change base unavailable; running full suite fail-closed."
            echo "web=true" >> "$GITHUB_OUTPUT"
            # Unknown change set ⇒ fail closed for EVERY path-aware job, the
            # vault probes included (review PR99 finding).
            echo "vaultdb=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$base_sha" HEAD)"
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^styx-js/|^\.github/workflows/styx-js-web\.yml'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi
          # Vault browser probes (US-005 engine + US-006 lifecycle) run only
          # when the engine, the lifecycle, their errors, suites, fixtures,
          # configs or this workflow change — real browsers are slow.
          if echo "$changed" | grep -qE '^styx-js/src/storage/vault-db\.js|^styx-js/src/storage/vault\.js|^styx-js/src/crypto/vault-errors\.js|^styx-js/src/crypto/vault-keys\.js|^styx-js/src/storage/vault-wrapper\.js|^styx-js/src/config/vault-stage\.js|^styx-js/test/storage/vault-db\.|^styx-js/test/storage/vault\.|^styx-js/test/fixtures/vault-db/|^styx-js/test/fixtures/vault/|^styx-js/test/fixtures/mls-state-v1/|^styx-js/playwright\.vault-db\.config\.js|^styx-js/playwright\.vault-lifecycle\.config\.js|^styx-js/vendor/styx-kdf-wasm/|^styx-js/package-lock\.json|^\.github/workflows/styx-js-web\.yml'; then
            echo "vaultdb=true" >> "$GITHUB_OUTPUT"
          else
            echo "vaultdb=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-gate:
    name: Build & anti-mock gate
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Unit + app tests
        working-directory: styx-js
        run: |
          npm ci
          npm test -- --testTimeout=20000
      - name: Build the PWA
        working-directory: styx-js/apps/chat
        run: |
          npm ci
          npm run build
      - name: Fail if the mock or demo data shipped
        working-directory: styx-js/apps/chat
        run: |
          if grep -rlE 'MockStyxChat|styx-lib-mock|seedDemo|Nodo Berlino' dist/; then
            echo "::error::Mock/demo artifacts found in the production bundle"
            exit 1
          fi
          echo "Production bundle is mock-free."
      - name: Fail if spike prototypes shipped
        working-directory: styx-js/apps/chat
        run: |
          if grep -rl 'STYX_SPIKE_PROTOTYPE' dist/; then
            echo "::error::Spike prototype code found in the production bundle"
            exit 1
          fi
          echo "Production bundle is spike-free."
      - name: Fail if the KDF artifact leaks into the bundle
        working-directory: styx-js/apps/chat
        run: |
          if grep -rl 'styx_kdf_wasm\|argon2id_derive' dist/; then
            echo "::error::styx-kdf-wasm code found in the production bundle"
            exit 1
          fi
          echo "Production bundle is KDF-free."

      - name: Fail if the vault crypto formats or engine leak into the bundle
        working-directory: styx-js/apps/chat
        run: |
          # TEMPORARY gate (Blocco 3, PR-2/PR-4/PR-5): the vault format modules,
          # the IndexedDB engine and the lifecycle state machine live in the
          # source tree but are NOT runtime-integrated. While the styx.vault.stage
          # flag is off, no unequivocal identifier may reach dist/. Revised only
          # by the (separately authorized) PR that wires the vault into the app.
          if grep -rl 'styx-vault-wrapper\|styx-vault-manifest\|VAULT_WRAPPER_INVALID\|VAULT_MANIFEST_TAMPERED\|styx/vault/identity/v1\|VAULT_WRONG_STATE\|styx-vault-test\|VITE_VAULT_STAGE' dist/; then
            echo "::error::vault crypto-format / engine / lifecycle code found in the production bundle"
            exit 1
          fi
          echo "Production bundle is vault-free."

      - name: Fail if the vault worker runtime leaks into the bundle
        working-directory: styx-js/apps/chat
        run: |
          # TEMPORARY gate (Blocco 3, PR-3): the worker runtime lives in the
          # source tree but is NOT imported by the app — no identifier and no
          # worker chunk may reach dist/. Revised only by the (separately
          # authorized) PR that wires the vault into the app.
          if grep -rl 'vault-worker\|WORKER_TERMINATED\|WORKER_TIMEOUT\|argon2id_derive\|styx_kdf_wasm\|ad67202689c58d5e7b7a0b845d7b9d7253ecc04542f8921804c11d62942ae8f5' dist/; then
            echo "::error::vault worker runtime code found in the production bundle"
            exit 1
          fi
          if find dist -type f -name '*vault*' | grep .; then
            echo "::error::a vault worker chunk was emitted in the production bundle"
            exit 1
          fi
          echo "Production bundle is worker-runtime-free."

  vault-db-probes:
    name: Vault engine browser probes
    needs: changes
    if: needs.changes.outputs.vaultdb == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: styx-js
        run: npm ci
      - name: Install Playwright browsers
        working-directory: styx-js
        run: npx playwright install --with-deps chromium firefox
      - name: Run vault-db probes (P1–P12) on chromium and firefox
        working-directory: styx-js
        run: npx playwright test -c playwright.vault-db.config.js
      - name: Run vault lifecycle probes on chromium and firefox
        working-directory: styx-js
        run: npx playwright test -c playwright.vault-lifecycle.config.js

  gate:
    name: styx-js web gate
    needs: [changes, build-and-gate, vault-db-probes]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          WEB: ${{ needs.changes.outputs.web }}
          VAULTDB: ${{ needs.changes.outputs.vaultdb }}
          BUILD: ${{ needs.build-and-gate.result }}
          PROBES: ${{ needs.vault-db-probes.result }}
        run: |
          set -euo pipefail
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::styx-js change detection did not complete successfully: ${CHANGES_RESULT:-<empty>}"
            exit 1
          fi
          if [ "$WEB" != "true" ]; then
            echo "No styx-js paths changed — web build/gate skipped (green)."
            exit 0
          fi
          echo "build-and-gate: $BUILD"
          [ "$BUILD" = "success" ] || { echo "styx-js web gate FAILED."; exit 1; }
          if [ "$VAULTDB" = "true" ]; then
            echo "vault-db-probes: $PROBES"
            [ "$PROBES" = "success" ] || { echo "styx-js web gate FAILED (vault probes)."; exit 1; }
          fi
          echo "styx-js web gate passed."
