name: styx-js web

# Always runs so the final "Gate" check is present on every PR (stable required check),
# green-skipping when no styx-js paths changed.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect styx-js changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.f.outputs.web }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - id: f
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            git fetch --no-tags --depth=50 origin "$BASE_REF" >/dev/null 2>&1 || true
            base_sha="$(git merge-base "origin/$BASE_REF" HEAD || echo "")"
          else
            zero="0000000000000000000000000000000000000000"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "$zero" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              base_sha="$BEFORE"
            else
              base_sha="$(git rev-parse HEAD~1 2>/dev/null || echo "")"
            fi
          fi
          if [ -z "$base_sha" ]; then
            echo "web=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed="$(git diff --name-only "$base_sha" HEAD)"
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^styx-js/|^\.github/workflows/styx-js-web\.yml'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-gate:
    name: Build & anti-mock gate
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      # Relay integration tests (nostr-*, styx-chat-nostr) need a live strfry relay.
      # They skip gracefully when none is reachable, so this gate runs the unit + app
      # suite without external infra. Relay integration is exercised locally with
      # `docker compose -f styx-js/docker-compose.test.yml up -d`.
      - name: Unit + app tests
        working-directory: styx-js
        run: |
          npm ci
          npm test -- --testTimeout=20000

      - name: Build the PWA
        working-directory: styx-js/apps/chat
        run: |
          npm ci
          npm run build

      - name: Fail if the mock or demo data shipped
        working-directory: styx-js/apps/chat
        run: |
          # Distinctive markers only — no generic contact names that could false-positive.
          if grep -rlE 'MockStyxChat|styx-lib-mock|seedDemo|Nodo Berlino' dist/; then
            echo "::error::Mock/demo artifacts found in the production bundle"
            exit 1
          fi
          echo "Production bundle is mock-free."

  gate:
    name: styx-js web gate
    needs: [changes, build-and-gate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        env:
          WEB: ${{ needs.changes.outputs.web }}
          BUILD: ${{ needs.build-and-gate.result }}
        run: |
          set -euo pipefail
          if [ "$WEB" != "true" ]; then
            echo "No styx-js paths changed — web build/gate skipped (green)."
            exit 0
          fi
          echo "build-and-gate: $BUILD"
          [ "$BUILD" = "success" ] || { echo "styx-js web gate FAILED."; exit 1; }
          echo "styx-js web gate passed."
