name: styx-js web
on:
  pull_request:
    paths: ['styx-js/**', '.github/workflows/styx-js-web.yml']
  push:
    branches: [main]
    paths: ['styx-js/**', '.github/workflows/styx-js-web.yml']

jobs:
  build-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The integration tests exercise the real Nostr transport against a strfry relay.
      # Without one they throw "could not connect to any relay". Start the same relay the
      # local docker-compose.test.yml uses so the full suite runs in CI.
      - name: Start strfry relay
        working-directory: styx-js
        run: |
          docker compose -f docker-compose.test.yml up -d
          for i in $(seq 1 30); do
            (exec 3<>/dev/tcp/127.0.0.1/17777) 2>/dev/null && { echo "relay up"; break; }
            sleep 1
          done

      - name: Unit + integration tests (lib + app)
        working-directory: styx-js
        env:
          NOSTR_RELAY: ws://localhost:17777
        run: |
          npm ci
          npm test -- --testTimeout=20000

      - name: Build the PWA
        working-directory: styx-js/apps/chat
        run: |
          npm ci
          npm run build

      - name: Fail if the mock or demo data shipped
        working-directory: styx-js/apps/chat
        run: |
          # Distinctive markers only — no generic contact names that could false-positive.
          if grep -rlE 'MockStyxChat|styx-lib-mock|seedDemo|Nodo Berlino' dist/; then
            echo "::error::Mock/demo artifacts found in the production bundle"
            exit 1
          fi
          echo "Production bundle is mock-free."

      - name: Stop strfry relay
        if: always()
        working-directory: styx-js
        run: docker compose -f docker-compose.test.yml down || true
