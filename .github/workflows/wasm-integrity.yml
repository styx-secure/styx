name: WASM integrity

# The vendored OpenMLS->WASM crate is the cryptographic critical path. This workflow
# guarantees it can never be integrated unverified, on two tiers (see
# docs/architecture/wasm-ci-strategy.md):
#
#   * LIGHT  (every PR touching the artifact, its provenance, or its MLS/chat consumers):
#            artifact presence, checksum vs PROVENANCE, pin/version coherence, and the
#            adversarial-parser + MLS round-trip test suite. Fast, no rebuild.
#   * HERMETIC (any change to the crate source/patch/pin/toolchain/lockfile/artifact, or
#            a manual/release run): reproducible double build (verify.sh) that must be
#            byte-identical to itself and to the committed artifact, then publishes hashes.
#
# Always runs, so the final "gate" check is a stable required check (green-skip when no
# relevant paths changed).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {} # manual hermetic verification for releases

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CRATE_DIR: styx-js/vendor/openmls-wasm

jobs:
  changes:
    name: Detect WASM changes
    runs-on: ubuntu-latest
    outputs:
      crate: ${{ steps.f.outputs.crate }}
      light: ${{ steps.f.outputs.light }}
      kdf: ${{ steps.f.outputs.kdf }}
      kdflight: ${{ steps.f.outputs.kdflight }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - id: f
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "crate=true" >> "$GITHUB_OUTPUT"; echo "light=true" >> "$GITHUB_OUTPUT"
            echo "kdf=true" >> "$GITHUB_OUTPUT"; echo "kdflight=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "$EVENT" = "pull_request" ]; then
            git fetch --no-tags --depth=50 origin "$BASE_REF" >/dev/null 2>&1 || true
            base_sha="$(git merge-base "origin/$BASE_REF" HEAD || echo "")"
          else
            zero="0000000000000000000000000000000000000000"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "$zero" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              base_sha="$BEFORE"
            else
              base_sha="$(git rev-parse HEAD~1 2>/dev/null || echo "")"
            fi
          fi
          if [ -z "$base_sha" ]; then
            echo "crate=true" >> "$GITHUB_OUTPUT"; echo "light=true" >> "$GITHUB_OUTPUT"
            echo "kdf=true" >> "$GITHUB_OUTPUT"; echo "kdflight=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed="$(git diff --name-only "$base_sha" HEAD)"
          echo "Changed files:"; echo "$changed"
          # Crate-level: source/patch/pin/toolchain/lockfile/provenance/artifact. Editing
          # the workflow itself does NOT force a rebuild (it cannot change the artifact).
          if echo "$changed" | grep -qE '^styx-js/vendor/openmls-wasm/(patch/|build\.sh|verify\.sh|Cargo\.lock|PROVENANCE\.md|openmls_wasm(_bg)?\.(wasm|js)|.*\.d\.ts|package\.json)'; then
            crate=true; else crate=false; fi
          # Light-level: crate changes, the MLS/chat consumers, or this workflow (self-check).
          if [ "$crate" = "true" ] || echo "$changed" | grep -qE '^styx-js/src/(crypto/mls/|chat/)|^\.github/workflows/wasm-integrity\.yml'; then
            light=true; else light=false; fi
          echo "crate=$crate" >> "$GITHUB_OUTPUT"
          echo "light=$light" >> "$GITHUB_OUTPUT"
          # styx-kdf-wasm: same two tiers, separate lifecycle from openmls-wasm.
          if echo "$changed" | grep -qE '^styx-js/vendor/styx-kdf-wasm/'; then
            kdf=true; else kdf=false; fi
          if [ "$kdf" = "true" ] || echo "$changed" | grep -qE '^styx-js/src/crypto/kdf-bounds\.js|^styx-js/test/crypto/kdf-|^styx-js/test/fixtures/kdf-|^styx-js/playwright\.kdf\.config\.js|^\.github/workflows/wasm-integrity\.yml'; then
            kdflight=true; else kdflight=false; fi
          echo "kdf=$kdf" >> "$GITHUB_OUTPUT"
          echo "kdflight=$kdflight" >> "$GITHUB_OUTPUT"

  light:
    name: Artifact + parser checks
    needs: changes
    if: needs.changes.outputs.light == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Artifact present and non-trivial
        run: |
          set -euo pipefail
          cd "$CRATE_DIR"
          for f in openmls_wasm_bg.wasm openmls_wasm.js openmls_wasm.d.ts; do
            [ -s "$f" ] || { echo "::error::missing/empty vendored artifact: $f"; exit 1; }
          done
          bytes=$(stat -c%s openmls_wasm_bg.wasm)
          echo "openmls_wasm_bg.wasm = $bytes bytes"
          [ "$bytes" -gt 100000 ] || { echo "::error::wasm suspiciously small"; exit 1; }
      - name: Checksum matches recorded provenance
        run: |
          set -euo pipefail
          cd "$CRATE_DIR"
          wasm_hash=$(sha256sum openmls_wasm_bg.wasm | cut -d' ' -f1)
          echo "committed wasm sha256 = $wasm_hash"
          grep -q "$wasm_hash" PROVENANCE.md \
            || { echo "::error::wasm sha256 $wasm_hash is not recorded in PROVENANCE.md — artifact and provenance disagree"; exit 1; }
      - name: Pin coherence (build.sh vs PROVENANCE)
        run: |
          set -euo pipefail
          cd "$CRATE_DIR"
          pin=$(grep -oE 'OPENMLS_COMMIT="\$\{1:-[0-9a-f]{40}\}"' build.sh | grep -oE '[0-9a-f]{40}' | head -1)
          [ -n "$pin" ] || { echo "::error::could not read OPENMLS_COMMIT pin from build.sh"; exit 1; }
          echo "pinned OpenMLS commit = $pin"
          grep -q "$pin" PROVENANCE.md \
            || { echo "::error::pinned commit $pin is not documented in PROVENANCE.md"; exit 1; }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Adversarial parser + MLS round-trip tests
        working-directory: styx-js
        run: |
          npm ci
          node --experimental-vm-modules node_modules/.bin/jest \
            test/crypto/mls-adversarial.test.js \
            test/crypto/mls-panic.test.js \
            test/crypto/mls-member-identity.test.js \
            test/crypto/mls-session.test.js \
            --forceExit --testTimeout=30000

  hermetic:
    name: Reproducible rebuild
    needs: changes
    if: needs.changes.outputs.crate == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Reproducible double build must match the committed artifact
        working-directory: styx-js/vendor/openmls-wasm
        run: |
          set -euo pipefail
          chmod +x ./build.sh ./verify.sh
          ./verify.sh | tee /tmp/verify.out
      - name: Publish verified hashes
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wasm-verify-hashes
          path: /tmp/verify.out
          retention-days: 14

  kdf-light:
    name: KDF artifact + KAT checks
    needs: changes
    if: needs.changes.outputs.kdflight == 'true'
    runs-on: ubuntu-latest
    env:
      KDF_DIR: styx-js/vendor/styx-kdf-wasm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: No build cache or tool archives may ever be tracked
        run: |
          set -euo pipefail
          if git ls-files | grep '/target/'; then
            echo "::error::Cargo build cache (target/) is tracked in git"; exit 1; fi
          if git ls-files | grep -E 'wasm-pack-.*\.tar\.'; then
            echo "::error::wasm-pack tool archive is tracked in git"; exit 1; fi
          echo "No build cache or tool archives tracked."
      - name: Artifact present, checksums match, provenance agrees
        run: |
          set -euo pipefail
          cd "$KDF_DIR/pkg"
          sha256sum -c SHA256SUMS
          wasm_hash=$(sha256sum styx_kdf_wasm_bg.wasm | cut -d' ' -f1)
          echo "committed kdf wasm sha256 = $wasm_hash"
          grep -q "$wasm_hash" ../PROVENANCE.md \
            || { echo "::error::kdf wasm sha256 $wasm_hash is not recorded in PROVENANCE.md"; exit 1; }
          mls_hash=$(sha256sum ../../openmls-wasm/openmls_wasm_bg.wasm | cut -d' ' -f1)
          [ "$wasm_hash" != "$mls_hash" ] \
            || { echo "::error::KDF artifact must never equal the OpenMLS artifact"; exit 1; }
      - name: Pin coherence (build.sh vs PROVENANCE vs canonical crate)
        run: |
          set -euo pipefail
          cd "$KDF_DIR"
          image=$(grep -oE 'RUST_IMAGE="[^"]+"' build.sh | cut -d'"' -f2)
          wp_sha=$(grep -oE 'WASM_PACK_SHA256="[0-9a-f]{64}"' build.sh | grep -oE '[0-9a-f]{64}')
          [ -n "$image" ] && [ -n "$wp_sha" ] || { echo "::error::could not read pins from build.sh"; exit 1; }
          echo "kdf pins: $image / wasm-pack sha $wp_sha"
          grep -qF "$image" PROVENANCE.md \
            || { echo "::error::pinned image is not documented in PROVENANCE.md"; exit 1; }
          grep -qF "$wp_sha" PROVENANCE.md \
            || { echo "::error::pinned wasm-pack sha256 is not documented in PROVENANCE.md"; exit 1; }
          # The mandate requires the SAME pinned toolchain as the canonical crate:
          grep -qF "$image" ../openmls-wasm/build.sh \
            || { echo "::error::KDF toolchain image diverges from the canonical openmls-wasm build"; exit 1; }
          grep -qF "$wp_sha" ../openmls-wasm/build.sh \
            || { echo "::error::KDF wasm-pack pin diverges from the canonical openmls-wasm build"; exit 1; }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: KAT + bounds + anti-allocation (node)
        working-directory: styx-js
        run: |
          npm ci
          node --experimental-vm-modules node_modules/.bin/jest \
            test/crypto/kdf-bounds.test.js \
            test/crypto/kdf-wasm.test.js \
            --forceExit --testTimeout=60000
      - name: KAT on real browsers (Chromium + Firefox)
        working-directory: styx-js
        run: |
          npx playwright install --with-deps chromium firefox
          npx playwright test -c playwright.kdf.config.js

  kdf-hermetic:
    name: KDF reproducible rebuild + supply chain
    needs: changes
    if: needs.changes.outputs.kdf == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Reproducible double build (with cargo test) must match the committed artifact
        working-directory: styx-js/vendor/styx-kdf-wasm
        run: |
          set -euo pipefail
          chmod +x ./build.sh ./verify.sh
          ./verify.sh | tee /tmp/kdf-verify.out
      - name: cargo audit + cargo deny (pinned, sha256-verified binaries)
        working-directory: styx-js/vendor/styx-kdf-wasm
        run: |
          set -euo pipefail
          chmod +x ./audit.sh
          ./audit.sh | tee /tmp/kdf-audit.out
      - name: Publish verified hashes and reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: kdf-verify-reports
          path: |
            /tmp/kdf-verify.out
            /tmp/kdf-audit.out
          retention-days: 14

  gate:
    name: WASM integrity gate
    needs: [changes, light, hermetic, kdf-light, kdf-hermetic]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Aggregate result (fail-closed — review K9)
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          LIGHT_NEEDED: ${{ needs.changes.outputs.light }}
          CRATE_NEEDED: ${{ needs.changes.outputs.crate }}
          KDF_NEEDED: ${{ needs.changes.outputs.kdf }}
          KDFLIGHT_NEEDED: ${{ needs.changes.outputs.kdflight }}
          LIGHT: ${{ needs.light.result }}
          HERMETIC: ${{ needs.hermetic.result }}
          KDF_LIGHT: ${{ needs.kdf-light.result }}
          KDF_HERMETIC: ${{ needs.kdf-hermetic.result }}
        # The decision logic lives in a pure, testable script; the full
        # decision table runs in jest (styx-js/test/ci/wasm-gate.test.js).
        run: bash .github/scripts/wasm-integrity-gate.sh
