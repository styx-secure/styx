name: Dart reference stack

# Path-aware but ALWAYS runs, so the final "Dart reference stack" check is present on
# every PR (never "Expected"/absent) and can be a stable required check. When no Dart
# paths change, the heavy jobs are skipped and the gate reports an explicit green skip.
# The Dart stack is reference/archive (ADR-0003); it runs on the pure-Dart toolchain.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Least privilege: these jobs only read the repository.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Dart changes
    runs-on: ubuntu-latest
    outputs:
      dart: ${{ steps.filter.outputs.dart }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            git fetch --no-tags --depth=50 origin "$BASE_REF" >/dev/null 2>&1 || true
            base_sha="$(git merge-base "origin/$BASE_REF" HEAD || echo "")"
          else
            zero="0000000000000000000000000000000000000000"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "$zero" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              base_sha="$BEFORE"
            else
              base_sha="$(git rev-parse HEAD~1 2>/dev/null || echo "")"
            fi
          fi
          if [ -z "$base_sha" ]; then
            # No base to diff against (first commit): run the full suite to be safe.
            echo "dart=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed="$(git diff --name-only "$base_sha" HEAD)"
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^(packages/|test_integration/|pubspec\.ya?ml|pubspec\.lock|melos\.ya?ml|analysis_options\.yaml|tool/|\.github/workflows/ci\.yml)'; then
            echo "dart=true" >> "$GITHUB_OUTPUT"
          else
            echo "dart=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze & Format
    needs: changes
    if: needs.changes.outputs.dart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable
      - run: dart pub global activate melos 7.8.2
      - run: melos bootstrap
      - run: melos run analyze
      - run: melos run format:check

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.dart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable
      # Drift/sqlite3 DAO tests dlopen libsqlite3.so; runners ship only libsqlite3.so.0,
      # so install the -dev package that provides the unversioned symlink.
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - run: dart pub global activate melos 7.8.2
      - run: melos bootstrap
      - run: melos run test:all

  coverage:
    name: Coverage baseline
    needs: changes
    if: needs.changes.outputs.dart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - run: dart pub global activate melos 7.8.2
      - run: dart pub global activate coverage
      - run: melos bootstrap
      - run: melos run coverage:check

  gate:
    # Single stable check ("Dart reference stack / Gate") — always present on every PR.
    name: Gate
    needs: [changes, analyze, test, coverage]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        env:
          DART: ${{ needs.changes.outputs.dart }}
          ANALYZE: ${{ needs.analyze.result }}
          TEST: ${{ needs.test.result }}
          COVERAGE: ${{ needs.coverage.result }}
        run: |
          set -euo pipefail
          if [ "$DART" != "true" ]; then
            echo "No Dart paths changed — reference-stack checks skipped (green)."
            exit 0
          fi
          fail=0
          for pair in "analyze:$ANALYZE" "test:$TEST" "coverage:$COVERAGE"; do
            name="${pair%%:*}"; res="${pair#*:}"
            echo "$name: $res"
            [ "$res" = "success" ] || fail=1
          done
          if [ "$fail" -ne 0 ]; then
            echo "Dart reference-stack checks FAILED."; exit 1
          fi
          echo "All Dart reference-stack checks passed."
