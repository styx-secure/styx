name: Dart reference stack

# Path-aware but ALWAYS runs, so the final gate is present on every PR and
# merge-group commit. A failed detector can never become a green skip.
on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Dart changes
    runs-on: ubuntu-latest
    outputs:
      dart: ${{ steps.filter.outputs.dart }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "merge_group" ]; then
            base_sha="$MERGE_GROUP_BASE_SHA"
          elif [ "$EVENT" = "pull_request" ]; then
            git fetch --no-tags --depth=50 origin "$BASE_REF" >/dev/null 2>&1 || true
            base_sha="$(git merge-base "origin/$BASE_REF" HEAD || echo "")"
          else
            zero="0000000000000000000000000000000000000000"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "$zero" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              base_sha="$BEFORE"
            else
              base_sha="$(git rev-parse HEAD~1 2>/dev/null || echo "")"
            fi
          fi
          if [ -z "$base_sha" ] || ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            echo "Dart change base unavailable; running full suite fail-closed."
            echo "dart=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$base_sha" HEAD)"
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^(packages/|test_integration/|pubspec\.ya?ml|pubspec\.lock|melos\.ya?ml|analysis_options\.yaml|tool/|\.github/workflows/ci\.yml)'; then
            echo "dart=true" >> "$GITHUB_OUTPUT"
          else
            echo "dart=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze & Format
    needs: changes
    if: needs.changes.outputs.dart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: "3.10.8"
      - run: dart pub global activate melos 7.8.2
      - run: melos bootstrap
      - run: melos run analyze
      - run: melos run format:check

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.dart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: "3.10.8"
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - run: dart pub global activate melos 7.8.2
      - run: melos bootstrap
      - run: melos run test:all

  coverage:
    name: Coverage baseline
    needs: changes
    if: needs.changes.outputs.dart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: "3.10.8"
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - run: dart pub global activate melos 7.8.2
      - run: dart pub global activate coverage
      - run: melos bootstrap
      - run: melos run coverage:check

  gate:
    name: Dart reference stack gate
    needs: [changes, analyze, test, coverage]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          DART: ${{ needs.changes.outputs.dart }}
          ANALYZE: ${{ needs.analyze.result }}
          TEST: ${{ needs.test.result }}
          COVERAGE: ${{ needs.coverage.result }}
        run: |
          set -euo pipefail
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::Dart change detection failed: ${CHANGES_RESULT:-<empty>}"
            exit 1
          fi
          if [ "$DART" != "true" ]; then
            echo "No Dart paths changed — reference-stack checks skipped (green)."
            exit 0
          fi
          fail=0
          for pair in "analyze:$ANALYZE" "test:$TEST" "coverage:$COVERAGE"; do
            name="${pair%%:*}"; res="${pair#*:}"
            echo "$name: $res"
            [ "$res" = "success" ] || fail=1
          done
          [ "$fail" -eq 0 ] || { echo "Dart reference-stack checks FAILED."; exit 1; }
          echo "All Dart reference-stack checks passed."
