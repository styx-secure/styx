name: CI

on:
  # This is the Dart reference-stack CI (ADR-0003). It runs only when Dart code changes,
  # so it does not gate product PRs that touch only styx-js/ or docs. The Dart stack has
  # a pre-existing CI failure tracked separately (see workspace MIGRATION-LOG).
  push:
    branches: [main, develop]
    paths: ['packages/**', 'test_integration/**', 'pubspec.yaml', 'pubspec.lock', 'analysis_options.yaml', 'tool/**']
  pull_request:
    branches: [main, develop]
    paths: ['packages/**', 'test_integration/**', 'pubspec.yaml', 'pubspec.lock', 'analysis_options.yaml', 'tool/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run analyze
      - run: melos run format:check

  test:
    name: Test (Dart ${{ matrix.sdk }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk: ["3.6.0", "3.10.8"]
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run test:all

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub global activate melos
      - run: dart pub global activate coverage
      - run: sudo apt-get install -y lcov
      - run: melos bootstrap
      - run: melos run coverage:check

  regression:
    name: Full Regression
    runs-on: ubuntu-latest
    needs: [analyze, test, coverage]
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run ci
