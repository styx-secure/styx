name: Agent scope evidence

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
      - edited

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read

concurrency:
  group: ${{ github.repository }}-agent-scope-evidence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scope-evidence:
    name: Agent scope evidence (observation)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      STYX_REPORT_PATH: ${{ runner.temp }}/styx-task-scope-report.json
      STYX_RESULT_PATH: ${{ runner.temp }}/styx-scope-exit-code.txt

    steps:
      - name: Checkout trusted base commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
          lfs: false
          submodules: false

      - name: Run trusted-base scope observation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          python3 tools/agent-enforcement/ci_adapter.py run \
            --event-file "$GITHUB_EVENT_PATH" \
            --repo "$GITHUB_WORKSPACE" \
            --runner-temp "$RUNNER_TEMP" \
            --repository "$GITHUB_REPOSITORY" \
            --api-url "$GITHUB_API_URL" \
            --server-url "$GITHUB_SERVER_URL" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --report "$STYX_REPORT_PATH"
          observation_code=$?
          set -e
          case "$observation_code" in
            0|2|3) ;;
            *) observation_code=3 ;;
          esac
          printf '%s\n' "$observation_code" > "$STYX_RESULT_PATH"

      - name: Upload canonical scope report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: styx-scope-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/styx-task-scope-report.json
          if-no-files-found: ignore
          retention-days: 14
          compression-level: 9
          overwrite: false
          include-hidden-files: false

      - name: Write safe job summary
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -f tools/agent-enforcement/ci_adapter.py ]]; then
            python3 tools/agent-enforcement/ci_adapter.py summarize \
              --report "$STYX_REPORT_PATH" \
              --summary "$GITHUB_STEP_SUMMARY"
            summary_code=$?
          else
            printf '%s\n' \
              '## Styx scope evidence' \
              '' \
              '**ERROR** — trusted CI adapter is unavailable.' \
              >> "$GITHUB_STEP_SUMMARY"
            summary_code=3
          fi
          set -e
          if [[ "$summary_code" -ne 0 && "$summary_code" -ne 2 && "$summary_code" -ne 3 ]]; then
            summary_code=3
          fi
          if [[ "$summary_code" -eq 3 ]]; then
            printf '3\n' > "$STYX_RESULT_PATH"
          fi

      - name: Conclude observation
        if: always()
        shell: bash
        run: |
          if [[ ! -f "$STYX_RESULT_PATH" ]]; then
            exit 3
          fi
          observation_code="$(cat "$STYX_RESULT_PATH")"
          case "$observation_code" in
            0|2|3) exit "$observation_code" ;;
            *) exit 3 ;;
          esac
