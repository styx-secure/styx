name: styx_workspace
publish_to: none

environment:
  sdk: ^3.10.0

workspace:
  - packages/crypto_core
  - packages/storage
  - packages/ledger_engine
  - packages/transport
  - packages/push_bridge_client
  - packages/styx
  - test_integration

dev_dependencies:
  dart_code_linter: ^4.1.6
  melos: ^7.0.0
  very_good_analysis: ^10.0.0

melos:
  name: styx
  packages:
    - packages/*
    - test_integration

  # themis_survey is a Flutter package (depends on the flutter SDK) and is not a member
  # of the Dart pub `workspace:` above. The reference-stack CI runs on the pure-Dart
  # toolchain (dart-lang/setup-dart, no Flutter), so melos must skip it — otherwise
  # analyze/test would fail resolving `package:flutter`. See docs/architecture/decisions/ADR-0003.
  ignore:
    - packages/themis_survey

  scripts:
    analyze:
      # Serial (concurrency: 1): each `dart analyze` spawns an analysis server, and
      # running all packages at once can exhaust memory and crash the server on smaller
      # CI runners. failFast: false so every package is reported, not just the first.
      run: dart analyze --fatal-infos .
      exec:
        concurrency: 1
        failFast: false
      description: Run static analysis on all packages (serial, all reported).

    format:check:
      exec: dart format --output none --set-exit-if-changed .
      description: Check formatting on all packages.

    test:all:
      exec: dart test
      description: Run tests in all packages.
      packageFilters:
        dirExists: test

    coverage:check:
      run: bash tool/check_coverage.sh 90
      description: Check test coverage meets threshold.

    test:unit:
      exec: dart test --tags=unit
      description: Run unit tests in all packages.
      packageFilters:
        dirExists: test

    test:integration:
      exec: dart test --tags=integration
      description: Run integration tests.
      packageFilters:
        dirExists: test

    format:fix:
      exec: dart format .
      description: Auto-format all packages.

    clean:
      run: bash -c 'find . -name ".dart_tool" -o -name "build" -o -name "coverage" | xargs rm -rf'
      description: Clean build artifacts.

    deps:check:
      exec: dart pub outdated
      description: Check for outdated dependencies.

    ci:
      steps:
        - analyze
        - format:check
        - test:all
        - coverage:check
      description: Run the full CI pipeline locally.
