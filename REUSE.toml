# REUSE 3.3 licensing map for styx-secure/styx.
#
# Authorized by GitHub Issue #40 (human licensing GO) and implemented under
# GitHub Issue #41. The conceptual precedence, documented in LICENSING.md, is:
#
#   1. exact third-party and derivative classifications;
#   2. exact human-approved Apache-2.0 vector exceptions;
#   3. AGPL-3.0-or-later default for original Styx material.
#
# Mechanism (normative, REUSE 3.3 `precedence` key): every exact
# classification below carries `precedence = "override"`, so its REUSE
# information takes precedence for the matched files regardless of any other
# source. The broad original-Styx default deliberately carries no explicit
# precedence (it uses the default `closest` behaviour) and therefore never
# outranks an overriding exact classification.
#
# Do not add Apache-2.0 paths here. The six vector files below are the only
# approved exceptions; any addition requires a new inventory, an exact path
# list, an explicit human amendment to Issue #41 and an independent review.

version = 1

# ---------------------------------------------------------------------------
# 3) Default: original Styx material (no explicit precedence).
# ---------------------------------------------------------------------------

[[annotations]]
path = "**"
SPDX-FileCopyrightText = "2026 Maurizio Verde"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# ---------------------------------------------------------------------------
# 2) Exact Apache-2.0 exceptions — six synthetic interoperability vector
#    files, approved by the copyright holder in Issue #41. Nothing else.
# ---------------------------------------------------------------------------

[[annotations]]
path = [
  "styx-js/test/fixtures/vault-crypto-v1/hkdf-v1.json",
  "styx-js/test/fixtures/vault-crypto-v1/manifest-hmac-v1.json",
  "styx-js/test/fixtures/vault-crypto-v1/record-v1-bytes.json",
  "styx-js/test/fixtures/vault-crypto-v1/record-v1-json.json",
  "styx-js/test/fixtures/vault-crypto-v1/wrapper-v1.json",
  "styx-js/test/fixtures/kdf-kat-vectors.js",
]
precedence = "override"
SPDX-FileCopyrightText = "2026 Maurizio Verde"
SPDX-License-Identifier = "Apache-2.0"

