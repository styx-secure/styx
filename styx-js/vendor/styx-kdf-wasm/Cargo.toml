[package]
name = "styx-kdf-wasm"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Styx KDF artifact: bounded Argon2id derivation for the vault Root Storage Key wrapper. A deliberately separate WASM artifact from openmls-wasm (the MLS envelope pins that artifact's digest)."
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Exact pins; the committed Cargo.lock is authoritative and builds run --locked.
wasm-bindgen = "=0.2.126"
# js-sys minor tracks the wasm-bindgen release (0.3.103 <-> 0.2.126): needed to
# type- and length-check Uint8Array buffers WITHOUT a pre-validation copy (K8).
js-sys = "=0.3.103"
argon2 = { version = "=0.5.3", default-features = false, features = ["alloc"] }
