# cargo-deny policy for styx-kdf-wasm (checked by audit.sh and CI).
[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Every DEPENDENCY in the tree is permissive; see PROVENANCE.md for the full
# list. The allowlist below constrains dependencies only.
allow = ["MIT", "Apache-2.0", "BSD-3-Clause", "Unicode-3.0"]
# The root crate itself is unpublished (publish = false) original Styx
# software licensed AGPL-3.0-or-later (Issue #41). Ignore unpublished
# workspace members here so the crate's own copyleft license does not trip
# the dependency allowlist; AGPL is deliberately NOT added to `allow`.
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
