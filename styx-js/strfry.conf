##
## strfry config — minimal for testing
##

db = "./strfry-db/"

relay {
    bind = "0.0.0.0"
    port = 7777

    info {
        name = "styx-test-relay"
        description = "Test relay for styx-js integration tests"
    }

    maxWebsocketPayloadSize = 131072
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxSubsPerConnection = 20
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 0
    rejectEphemeralOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}
