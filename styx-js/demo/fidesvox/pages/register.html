<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registrazione — FidesVox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 400px; width: 100%; padding: 24px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-size: 1.8rem; color: #f8fafc; }
  .logo p { color: #64748b; font-size: 0.85rem; margin-top: 4px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 28px; }
  .card h2 { font-size: 1.1rem; margin-bottom: 20px; color: #f1f5f9; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 0.82rem; font-weight: 500; color: #94a3b8; margin-bottom: 6px; }
  .field input { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.9rem; font-family: inherit; }
  .field input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .error { background: #7f1d1d; color: #fca5a5; padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 12px; display: none; }
  button { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  button:hover { background: #2563eb; }
  .link { text-align: center; margin-top: 16px; font-size: 0.85rem; }
  .link a { color: #60a5fa; text-decoration: none; }
  .link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>FidesVox</h1>
    <p>Piattaforma per segnalazioni anonime</p>
  </div>

  <div class="card">
    <h2>Crea un account</h2>
    <div class="error" id="errorMsg"></div>
    <form id="registerForm" action="/api/register" method="POST">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="nome@azienda.it">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6" placeholder="Minimo 6 caratteri">
      </div>
      <div class="field">
        <label for="confirm">Conferma password</label>
        <input type="password" id="confirm" required minlength="6" placeholder="Ripeti la password">
      </div>
      <button type="submit">Registrati</button>
    </form>
  </div>

  <div class="link">
    Hai gia un account? <a href="/login">Accedi</a>
  </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
  const pw = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const errorEl = document.getElementById('errorMsg');

  if (pw !== confirm) {
    e.preventDefault();
    errorEl.textContent = 'Le password non corrispondono.';
    errorEl.style.display = 'block';
    return;
  }
  errorEl.style.display = 'none';
});
</script>
</body>
</html>
